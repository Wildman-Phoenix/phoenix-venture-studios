name: Phoenix RSS Autonomous Refresh

on:
  # One-time release proof trigger. Remove after the first successful main run.
  push:
    branches:
      - main
  schedule:
    - cron: "30 4 * * *"
    - cron: "30 10 * * *"
    - cron: "30 16 * * *"
    - cron: "30 22 * * *"
    - cron: "30 13 * * 5"
  workflow_dispatch:
    inputs:
      run_slot:
        description: "Run slot label"
        required: false
        default: "manual"

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/phoenix-venture-studios-rebuild
    env:
      PHOENIX_RSS_SITE_URL: https://phoenixventurestudios.com
      SITE_URL: https://phoenixventurestudios.com
      VITE_BASE_PATH: /
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL != '' && secrets.VITE_SUPABASE_URL || 'https://kqhteuhrhkqrsxynvxln.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY != '' && secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxaHRldWhyaGtxcnN4eW52eGxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMTY2MzQsImV4cCI6MjA5NTU5MjYzNH0.h_XKU4iUJ6PzvG7jfp5BaolZ6KH3pWBgkkV-70a3f38' }}
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY != '' && secrets.VITE_TURNSTILE_SITE_KEY || '0x4AAAAAADYIyBLRIGWMfJ3b' }}
      PHOENIX_RSS_RUN_SLOT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_slot || github.event.schedule == '30 10 * * *' && 'early-morning' || github.event.schedule == '30 16 * * *' && 'mid-morning' || github.event.schedule == '30 22 * * *' && 'afternoon' || github.event.schedule == '30 4 * * *' && 'late-night' || github.event.schedule == '30 13 * * 5' && 'friday-ai-trend-sweep' || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/phoenix-venture-studios-rebuild/package-lock.json

      - run: npm ci

      - run: npm run rss:test

      - run: npm run rss:hydrate-live

      - id: rss_run
        run: npm run rss:autonomous

      - run: npm run rss:validate

      - run: npm run rss:publish-preview
        if: steps.rss_run.outputs.output_changed == 'true'

      - run: npm run prepare:production
        if: steps.rss_run.outputs.output_changed == 'true'

      - run: node scripts/rss/validate-rss-output.mjs --deploy-artifacts
        if: steps.rss_run.outputs.output_changed == 'true'

      - name: Deploy production Pages
        id: deploy_production
        if: steps.rss_run.outputs.output_changed == 'true'
        run: |
          set -euo pipefail
          FEEDS=(feed.xml tools.xml ai-attention.xml social.xml tools-social.xml ai-attention-social.xml)

          verify_live_bundle() {
            local target="$1"
            local base_url="$2"
            for feed in "${FEEDS[@]}"; do
              expected_hash="$(shasum "dist/rss/${feed}" | awk '{print $1}')"
              live_hash="$(curl -fsSL -H 'Cache-Control: no-cache' "${base_url}/rss/${feed}?ts=$(date +%s)" | shasum | awk '{print $1}')"
              echo "Checked ${target}/${feed}: expected=${expected_hash} live=${live_hash}"
              [ "${live_hash}" = "${expected_hash}" ] || return 1
            done
          }

          deploy_candidate() {
            local label="$1"
            shift
            echo "Attempting production Pages deploy via ${label}"
            npx wrangler pages deploy dist --project-name phoenixventurestudios-com --commit-hash "${{ github.sha }}" --commit-dirty=true "$@"
            sleep 15
            verify_live_bundle "${label} Pages alias" "https://phoenixventurestudios-com.pages.dev"
            verify_live_bundle "${label} custom domain" "https://phoenixventurestudios.com"
          }

          if deploy_candidate "default production deploy"; then
            echo "branch=default" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if deploy_candidate "production branch deploy" --branch production; then
            echo "branch=production" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if deploy_candidate "main branch deploy" --branch main; then
            echo "branch=main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if deploy_candidate "master branch deploy" --branch master; then
            echo "branch=master" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No production deploy candidate produced full feed parity on both the Pages alias and custom domain."
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy preview hub
        id: deploy_preview
        if: always() && steps.rss_run.outputs.output_changed == 'true'
        working-directory: .
        continue-on-error: true
        run: npx wrangler pages deploy output/phoenix-previews-upload --project-name phoenix-previews --branch main --commit-hash "${{ github.sha }}" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summarize deploy status
        if: always() && steps.rss_run.outputs.output_changed == 'true'
        run: |
          {
            echo "## Phoenix RSS deploy status"
            echo ""
            echo "- Production Pages: ${{ steps.deploy_production.outcome }}"
            echo "- Production branch target: ${{ steps.deploy_production.outputs.branch || 'unverified' }}"
            echo "- Preview hub: ${{ steps.deploy_preview.outcome }}"
            echo ""
            if [ "${{ steps.deploy_production.outcome }}" != "success" ] || [ "${{ steps.deploy_preview.outcome }}" != "success" ]; then
              echo "Deploy auth or Pages project access is still blocking at least one publish target."
              echo "The RSS refresh itself completed, so investigate Cloudflare credentials or project permissions next."
            else
              echo "Both deploy targets completed successfully."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
